<!DOCTYPE html>
<html>
<head >
    <title>Truco</title>
    <script src="/swipl-bundle.js"></script>
    <link rel="stylesheet" href="cliente.css">
</head>
<body>
    <h2>Truco - Cliente Web</h2>

    <div>
        <label>Tu nombre:</label>
        <input id="nombre" type="text" />
        <button id="boton" onclick="conectar()">Conectar</button>
    </div>

    <div id="mensajes"></div>

    <div id="cartas_area"></div>
    
    <div id="input-area"></div>

    <script>
    let ws;
    let Prolog;
    let esperandoInput = false;
    let esperandoCarta = false;
    

    const ANCHO = 93;
    const ALTO  = 142;
    const FILAS    = { oro: 0, copa: 1, espada: 2, basto: 3 };
    const COLUMNAS = { 1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 7:6,
                       sota:7, caballo:8, rey:9,
                       10:7, 11:8, 12:9 };

    (async () => {
        const swipl = await SWIPL({ arguments: ["-q"] });
        Prolog = swipl.prolog;
        mostrar("Prolog WASM listo.");
        mostrar("Sistema listo. Ingresá tu nombre y conectate.");
    })();

    // --- Cartas ---
    function generarCarta(numero, palo) {
        const col  = COLUMNAS[numero];
        const fila = FILAS[palo];
        if (col === undefined || fila === undefined) return null;

        const div = document.createElement('div');
        div.className = 'carta deshabilitada';
        div.style.backgroundPosition = `-${col * ANCHO}px -${fila * ALTO}px`;
        div.title = `${numero} de ${palo}`;
        div.dataset.numero = numero;
        div.dataset.palo   = palo;
        div.addEventListener('click', () => {
            if (!esperandoCarta) return;
            tirarCarta(numero, palo);
        });
        return div;
    }

    function mostrarCartas(cartas) {
        const area = document.getElementById('cartas_area');
        area.innerHTML = '';
        cartas.forEach(([numero, palo]) => {
            const carta = generarCarta(numero, palo);
            if (carta) area.appendChild(carta);
        });
    }

    function habilitarCartas(habilitar) {
        esperandoCarta = habilitar;
        document.querySelectorAll('.carta').forEach(c => {
            c.classList.toggle('deshabilitada', !habilitar);
        });
    }

    

    // tirarCarta y enviarRespuesta ya no cambian mucho:
    function tirarCarta(numero, palo) {
        ws.send(JSON.stringify({carta: [numero, palo]}));
        // cliente.pl lo recibe, convierte a term Prolog, y lo manda al servidor
    }

    // --- WebSocket ---
    function conectar() {
        const nombre = document.getElementById("nombre").value;
        if (!nombre) { alert("Ingresá un nombre"); return; }
        ws = new WebSocket("ws://localhost:8316/ws");
        ws.onopen    = () => { mostrar("Conectado al servidor."); ws.send("join(" + nombre + ")."); };
        ws.onmessage = (event) => {
            const señal = JSON.parse(event.data);

            if (señal.accion === "pedir_carta") {
                habilitarCartas(true);
                mostrar(">>> Hacé click en la carta a tirar");
            }
            else if (señal.accion === "mostrar_botones") {
                mostrarBotones(señal.opciones);
            }
            else if (señal.accion === "mensaje") {
                mostrar(señal.texto);
            }
            else if (señal.accion === "mostrar_cartas") {
                mostrarCartas(señal.cartas);
            }
        };
        ws.onclose   = () => mostrar("Conexión cerrada.");
        ws.onerror   = (e) => mostrar("Error: " + e);
    }

    // --- Input area dinámica ---
    function mostrarBotones(opciones) {
        esperandoInput = true;
        const area = document.getElementById("input-area");
        area.innerHTML = '';  // limpiar botones anteriores
        opciones.forEach(({ valor, texto }) => {
            const btn = document.createElement('button');
            btn.textContent = texto;
            btn.onclick = () => enviarRespuesta(valor);
            area.appendChild(btn);
        });
        area.classList.add('visible');
    }

    function ocultarInputArea() {
        const area = document.getElementById("input-area");
        area.innerHTML = '';
        area.classList.remove('visible');
        esperandoInput = false;
    }

    function enviarRespuesta(valor) {
        if (!esperandoInput) return;
        mostrar("Vos: " + valor);
        ws.send(valor + ".");
        ocultarInputArea();
    }

    function mostrar(texto) {
        const div = document.getElementById("mensajes");
        div.innerHTML += texto + "\n";
        div.scrollTop = div.scrollHeight;
    }
    </script>
</body>
</html>
