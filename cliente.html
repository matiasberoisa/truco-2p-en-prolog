<!DOCTYPE html>
<html lang="es">
<head>
    <title>Truco</title>
    <meta charset="UTF-8">
    <script src="/swipl-bundle.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cliente.css">
</head>
<body>

    <div class="tp-header">
        <span class="tp-title">♠ Truco</span>
        <div class="tp-header-right">
            <div class="puntos-bar">
                <div class="punto-card">
                    <div class="label">Vos</div>
                    <div class="valor" id="pts-vos">0</div>
                </div>
                <div class="punto-card">
                    <div class="label">Rival</div>
                    <div class="valor" id="pts-rival">0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="tp-connect">
        <label>Tu nombre:</label>
        <input id="nombre" type="text" placeholder="Ingresá tu nombre..." />
        <button id="boton" onclick="conectar()">Conectar</button>
    </div>

    <div class="tp-main">

        <div class="tp-mesa">
            <div class="mesa-label">Oponente</div>
            <div class="oponente-cartas" id="cartas-oponente"></div>

            <div class="mesa-central" id="mesa-central">
                <span class="mesa-hint" id="mesa-hint">Las cartas jugadas aparecerán acá</span>
            </div>

            <div class="mesa-label">Tus cartas</div>
            <div id="cartas_area" class="cartas-jugador"></div>
        </div>

        <div class="tp-sidebar">
            <div id="turno-indicator" class="turno-badge" style="display:none">
                <div class="turno-dot"></div>
                Tu turno
            </div>
            <div class="log-box">
                <div class="log-title">Partida</div>
                <div id="mensajes" class="log-entries"></div>
            </div>
            <div class="acciones-box">
                <div class="acciones-title">Acciones</div>
                <div id="input-area" class="botones-accion"></div>
            </div>
        </div>
    </div>

    <script>
    let ws;
    let Prolog;
    let esperandoInput = false;
    let esperandoCarta = false;
    let miNombre = null;

    const ANCHO = 93;
    const ALTO  = 142;
    const FILAS    = { oro: 0, copa: 1, espada: 2, basto: 3 };
    const COLUMNAS = { 1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 7:6,
                       sota:7, caballo:8, rey:9,
                       10:7, 11:8, 12:9 };

    (async () => {
        const swipl = await SWIPL({ arguments: ["-q"] });
        Prolog = swipl.prolog;
        mostrar("Prolog WASM listo.");
        mostrar("Sistema listo. Ingresá tu nombre y conectate.");
    })();

    // ── Parsear lista de cartas Prolog [[7,espada],[sota,copa]] ──
    function parsearCartas(str) {
        const cartas = [];
        const re = /\[(\w+),(\w+)\]/g;
        let m;
        while ((m = re.exec(str)) !== null) {
            const num = isNaN(m[1]) ? m[1] : parseInt(m[1]);
            cartas.push([num, m[2]]);
        }
        return cartas;
    }

    // este metodo genera el elemento carta del sprite
    function generarCarta(numero, palo) {
        const col  = COLUMNAS[numero];
        const fila = FILAS[palo];
        if (col === undefined || fila === undefined) return null;
        const div = document.createElement('div');
        div.className = 'carta deshabilitada';
        div.style.backgroundPosition = `-${col * ANCHO}px -${fila * ALTO}px`;
        div.title = `${numero} de ${palo}`;
        div.dataset.numero = numero;
        div.dataset.palo   = palo;
        div.addEventListener('click', () => {
            if (!esperandoCarta) return;
            tirarCarta(numero, palo);
        });
        return div;
    }

    // esta funcion muestra las cartas que el servidor dice que tenemos disponibles para jugar
    function mostrarCartas(cartas) {
        const area = document.getElementById('cartas_area');
        area.innerHTML = '';
        cartas.forEach(([numero, palo]) => {
            const carta = generarCarta(numero, palo);
            if (carta) area.appendChild(carta);
        });
        actualizarReversos(cartas.length);
    }

    function actualizarReversos(cantidad) {
        const cont = document.getElementById('cartas-oponente');
        cont.innerHTML = '';
        for (let i = 0; i < cantidad; i++) {
            const d = document.createElement('div');
            d.className = 'carta-reverso';
            cont.appendChild(d);
        }
    }

    function habilitarCartas(habilitar) {
        esperandoCarta = habilitar;
        document.querySelectorAll('#cartas_area .carta').forEach(c => {
            c.classList.toggle('deshabilitada', !habilitar);
        });
        document.getElementById('turno-indicator').style.display = habilitar ? 'flex' : 'none';
    }

    function tirarCarta(numero, palo) {
        ws.send("[" + numero + "," + palo + "].");
        habilitarCartas(false);
    }

    // ── Mesa central: mostrar carta jugada ──
    // Servidor manda: "el jugador Juan tira la carta: [7,espada]"
    function intentarMostrarCartaEnMesa(msg) {
        const m = msg.match(/el jugador (\S+) tira la carta: \[(\w+),(\w+)\]/);
        if (!m) return;
        const [, nombre, numStr, palo] = m;
        const numero = isNaN(numStr) ? numStr : parseInt(numStr);

        const mesa = document.getElementById('mesa-central');
        const hint = document.getElementById('mesa-hint');
        if (hint) hint.remove();

        // Con 2 cartas ya en mesa limpiamos para la siguiente mano
        const enMesa = mesa.querySelectorAll('.carta-en-mesa');
        if (enMesa.length >= 2) mesa.innerHTML = '';

        const col  = COLUMNAS[numero];
        const fila = FILAS[palo];
        if (col === undefined || fila === undefined) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'carta-en-mesa';

        const label = document.createElement('div');
        label.className = 'carta-mesa-label';
        label.textContent = nombre === miNombre ? 'Vos' : nombre;

        const div = document.createElement('div');
        div.className = 'carta';
        div.style.backgroundPosition = `-${col * ANCHO}px -${fila * ALTO}px`;
        div.style.cursor = 'default';
        div.style.pointerEvents = 'none';

        wrapper.appendChild(label);
        wrapper.appendChild(div);
        mesa.appendChild(wrapper);
    }

    // ── Limpiar mesa al inicio de nueva ronda ──
    function limpiarMesa() {
        const mesa = document.getElementById('mesa-central');
        mesa.innerHTML = '';
        // no restauramos el hint — la mesa queda vacía limpia
    }

    // ── Puntajes ──
    // Servidor manda: "Puntaje - Juan: 7 | Carlos: 4"
    function intentarActualizarPuntaje(msg) {
        const m = msg.match(/^Puntaje\s*-\s*(\S+):\s*(\d+)\s*\|\s*(\S+):\s*(\d+)/);
        if (!m) return;
        const [, nombre1, pts1, nombre2, pts2] = m;
        if (nombre1 === miNombre) {
            document.getElementById('pts-vos').textContent   = pts1;
            document.getElementById('pts-rival').textContent = pts2;
        } else {
            document.getElementById('pts-vos').textContent   = pts2;
            document.getElementById('pts-rival').textContent = pts1;
        }
    }

    // ── WebSocket ──
    function conectar() {
        const nombre = document.getElementById("nombre").value.trim();
        if (!nombre) { alert("Ingresá un nombre"); return; }
        miNombre = nombre;
        ws = new WebSocket("ws://localhost:8316/ws");
        ws.onopen = () => {
            mostrar("Conectado al servidor.");
            ws.send("join(" + nombre + ").");
        };
        ws.onmessage = (event) => {
            const msg = event.data;
            mostrar("Servidor: " + msg);

            // Siempre intentar actualizar puntaje y mesa
            intentarActualizarPuntaje(msg);
            intentarMostrarCartaEnMesa(msg);

            // Nueva ronda: limpiar mesa y cartas viejas
            if (msg.includes("RONDA")) {
                limpiarMesa();
                document.getElementById('cartas_area').innerHTML = '';
                actualizarReversos(0);
                //return; // Creo que es esto lo que no deja ver despues las cartas para la siguiente ronda
            }

            // El rival está jugando: deshabilitar todo del lado nuestro
            if (msg.includes("Esta jugando sus cartas el jugador contrario")) {
                ocultarInputArea();
                habilitarCartas(false);
                //return;
            }

            if (msg === "elige_accion") {
                mostrarBotones([
                    {valor: "1", texto: "1. Cantar envido"},
                    {valor: "2", texto: "2. Cantar truco"},
                    {valor: "3", texto: "3. Jugar carta"},
                    {valor: "4", texto: "4. Irse al mazo"}
                ]);
            } else if (msg === "elige_accion_sin_envido") {
                mostrarBotones([
                    {valor: "1", texto: "1. Cantar truco"},
                    {valor: "2", texto: "2. Jugar carta"},
                    {valor: "3", texto: "3. Irse al mazo"}
                ]);
            } else if (msg.includes("Que carta tira")) {
                // no habilitar acá — se habilita al recibir cartas disponibles
            } else if (msg.includes("aceptar: y")) {
                mostrarBotones([
                    {valor: "y", texto: "✓ Quiero"},
                    {valor: "n", texto: "✗ No quiero"}
                ]);
            } else if (msg.includes("cartas restantes:")) {
                const match = msg.match(/cartas restantes: (.+)/);
                if (match) {
                    const cartas = parsearCartas(match[1]);
                    if (cartas.length) mostrarCartas(cartas);
                }
            } else if (msg.includes("cartas disponibles:")) {
                // Este mensaje llega justo antes de que el servidor espere la carta
                // → renderizar Y habilitar en el mismo momento
                const match = msg.match(/cartas disponibles: (.+)/);
                if (match) {
                    const cartas = parsearCartas(match[1]);
                    if (cartas.length) {
                        mostrarCartas(cartas);
                        habilitarCartas(true);
                    }
                }
            }
        };
        ws.onclose = () => mostrar("Conexión cerrada.");
        ws.onerror = (e) => mostrar("Error: " + e);
    }

    // ── Botones de acción ──
    function mostrarBotones(opciones) {
        esperandoInput = true;
        const area = document.getElementById("input-area");
        area.innerHTML = '';
        opciones.forEach(({ valor, texto }) => {
            const btn = document.createElement('button');
            btn.textContent = texto;
            btn.onclick = () => enviarRespuesta(valor);
            area.appendChild(btn);
        });
        area.classList.add('visible');
    }

    function ocultarInputArea() {
        const area = document.getElementById("input-area");
        area.innerHTML = '';
        area.classList.remove('visible');
        esperandoInput = false;
    }

    function enviarRespuesta(valor) {
        if (!esperandoInput) return;
        mostrar("Vos: " + valor);
        ws.send(valor + ".");
        ocultarInputArea();
    }

    function mostrar(texto) {
        const div = document.getElementById("mensajes");
        div.innerHTML += texto + "\n";
        div.scrollTop = div.scrollHeight;
    }
    </script>

    <style>
    .carta-en-mesa {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }
    .carta-mesa-label {
        font-size: 11px;
        font-weight: 500;
        color: rgba(232,223,200,0.6);
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }
    </style>
</body>
</html>
