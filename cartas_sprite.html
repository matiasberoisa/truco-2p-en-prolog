<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cartas Españolas - Sprite Sheet</title>
<style>
  body { font-family: sans-serif; background: #1a472a; padding: 20px; }
  h3   { color: #fff; margin: 16px 0 8px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }

  .carta {
    width: 93px;
    height: 142px;
    background-image: url('barajaNueva.png');
    background-repeat: no-repeat;
    display: inline-block;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.4);
  }
  .carta:hover {
    transform: translateY(-10px);
    box-shadow: 4px 8px 16px rgba(0,0,0,0.6);
  }
  .fila { display: flex; gap: 6px; flex-wrap: wrap; }
</style>
</head>
<body>

<h3>Oros</h3>
<div class="fila" id="oro"></div>

<h3>Copas</h3>
<div class="fila" id="copa"></div>

<h3>Espadas</h3>
<div class="fila" id="espada"></div>

<h3>Bastos</h3>
<div class="fila" id="basto"></div>

<script>
// Dimensiones de cada carta en el sprite
const ANCHO = 93;
const ALTO  = 142;

// Orden de filas en la imagen
const FILAS = { oro: 0, copa: 1, espada: 2, basto: 3 };

// Orden de columnas en la imagen (la imagen no tiene 8 y 9)
const COLUMNAS = { 1:0, 2:1, 3:2, 4:3, 5:4, 6:5, 7:6, sota:7, caballo:8, rey:9 };

// En Prolog usás 10=sota, 11=caballo, 12=rey — mapear también esos
const ALIAS = { 10:'sota', 11:'caballo', 12:'rey' };

function generarCarta(numero, palo) {
  const n = ALIAS[numero] || numero;
  const col = COLUMNAS[n];
  const fila = FILAS[palo];
  if (col === undefined || fila === undefined) return null;

  const x = col  * ANCHO;
  const y = fila * ALTO;

  const div = document.createElement('div');
  div.className = 'carta';
  div.style.backgroundPosition = `-${x}px -${y}px`;
  div.title = `${numero} de ${palo}`;
  return div;
}

// Renderizar todas las cartas
const numeros = [1, 2, 3, 4, 5, 6, 7, 'sota', 'caballo', 'rey'];
const palos   = ['oro', 'copa', 'espada', 'basto'];

palos.forEach(palo => {
  const contenedor = document.getElementById(palo);
  numeros.forEach(n => {
    const carta = generarCarta(n, palo);
    if (carta) contenedor.appendChild(carta);
  });
});
</script>
</body>
</html>
